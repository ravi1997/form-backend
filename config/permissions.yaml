  "GET /mahasangraha/api/v1/admin/organizations/*":
    permission: "GET /mahasangraha/api/v1/admin/organizations/*"
  "POST /mahasangraha/api/v1/admin/organizations/*":
    permission: "POST /mahasangraha/api/v1/admin/organizations/*"
  "PUT /mahasangraha/api/v1/admin/organizations/*":
    permission: "PUT /mahasangraha/api/v1/admin/organizations/*"
  "DELETE /mahasangraha/api/v1/admin/organizations/*":
