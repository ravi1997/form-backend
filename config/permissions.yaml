  "GET /api/v1/projects/*/forms/*/permissions":
    permission: "GET /api/v1/projects/*/forms/*/permissions"
  "PUT /api/v1/projects/*/forms/*/permissions":
    permission: "PUT /api/v1/projects/*/forms/*/permissions"
  "POST /api/v1/projects/*/forms/*/publish":
    permission: "POST /api/v1/projects/*/forms/*/publish"
  "POST /api/v1/projects/*/forms/*/unpublish":
    permission: "POST /api/v1/projects/*/forms/*/unpublish"
  "GET /api/v1/users/*":
    permission: "GET /api/v1/users/*"
  "GET /api/v1/user/*":
    permission: "GET /api/v1/user/*"
  "GET /api/v1/analytics/*":
