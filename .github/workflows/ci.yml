name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6.0
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      APP_ENV: development
      MONGODB_URI: mongodb://localhost:27017/forms_ci
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET_KEY: ci-test-secret-change-before-prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy pip-audit bandit

      - name: Lint
        run: |
          black --check .
          flake8 .

      - name: Type check
        run: mypy . || true

      - name: Security scan
        run: |
          bandit -q -r . -x ./venv,./tests
          pip-audit --strict || true

      - name: Unit and integration tests
        run: pytest -q --cov=services --cov=routes --cov-report=term-missing

      - name: Export API contract
        run: python scripts/export_openapi.py
