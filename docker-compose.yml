version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - upload_volume:/var/www/uploads:ro
      - web_static_volume:/var/www/html:ro
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongo:27017/forms_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - APP_ENV=production
    volumes:
      - upload_volume:/app/uploads
    depends_on:
      - mongo
      - redis
      - elasticsearch

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery worker --loglevel=info
    environment:
      - MONGODB_URI=mongodb://mongo:27017/forms_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - APP_ENV=production
    volumes:
      - upload_volume:/app/uploads
    depends_on:
      - redis
      - mongo

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery beat --loglevel=info
    environment:
      - MONGODB_URI=mongodb://mongo:27017/forms_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - APP_ENV=production
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

  elasticsearch:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mongo_data:
  es_data:
  upload_volume:
  web_static_volume:
