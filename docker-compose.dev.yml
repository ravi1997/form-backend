# Development overrides — merged on top of docker-compose.yml via:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  backend:
    environment:
      - APP_ENV=development
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - FIELD_ENCRYPTION_KEY=8x1r9dNq9kYxX6vS7fR7I2g8xQm2Ue4nZsJ5pT3wCkM=
      - ELASTICSEARCH_URL=http://forms_elasticsearch:9200
      - DEV_ALICE_PASSWORD=SecureP@ss2026
    # Bind-mount the entire source code directory for live reloading
    volumes:
      - .:/app
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    # Use Flask's built-in development server with --debug and --reload for hot-reloading.
    # Keep the container port aligned with the published host mapping from docker-compose.yml.
    command: [ "python", "-m", "flask", "--app", "app", "run", "--host", "0.0.0.0", "--port", "5000", "--debug", "--reload" ]
    restart: "no"

  celery:
    environment:
      - APP_ENV=development
      - FIELD_ENCRYPTION_KEY=8x1r9dNq9kYxX6vS7fR7I2g8xQm2Ue4nZsJ5pT3wCkM=
      - ELASTICSEARCH_URL=http://forms_elasticsearch:9200
    volumes:
      - .:/app
      - ./logs:/app/logs
    # Note: Standard Celery doesn't hot-reload automatically. 
    # Use 'make restart' to pick up changes in worker code.
    restart: "no"

  celery-beat:
    environment:
      - APP_ENV=development
      - FIELD_ENCRYPTION_KEY=8x1r9dNq9kYxX6vS7fR7I2g8xQm2Ue4nZsJ5pT3wCkM=
      - ELASTICSEARCH_URL=http://forms_elasticsearch:9200
    volumes:
      - .:/app
      - ./logs:/app/logs
    restart: "no"

  event-listener:
    environment:
      - APP_ENV=development
      - FIELD_ENCRYPTION_KEY=8x1r9dNq9kYxX6vS7fR7I2g8xQm2Ue4nZsJ5pT3wCkM=
      - ELASTICSEARCH_URL=http://forms_elasticsearch:9200
    volumes:
      - .:/app
      - ./logs:/app/logs
    restart: "no"
